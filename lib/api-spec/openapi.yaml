  # Reports
  /reports/sales:
    get:
      operationId: getSalesReport
      tags: [dashboard]
      summary: Get sales report summary
      parameters:
        - name: period
          in: query
          schema:
            type: string
            enum: [daily, monthly, yearly]
      responses:
        "200":
          description: Sales report
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SalesReportRow"

  /reports/profit-loss:
    get:
      operationId: getProfitLossReport
      tags: [dashboard]
      summary: Get profit & loss report
      responses:
        "200":
          description: Profit & loss
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProfitLossReport"

